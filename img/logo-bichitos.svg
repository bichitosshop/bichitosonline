<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1536 342"
     width="1536"
     height="342"
     fill="none">

  <defs>
    <clipPath id="badgeClip">
      <circle cx="200" cy="165" r="142"/>
    </clipPath>

    <radialGradient id="badgeBlue" cx="34%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#11ABC9"/>
      <stop offset="58%" stop-color="#058EAB"/>
      <stop offset="100%" stop-color="#006A80"/>
    </radialGradient>

    <linearGradient id="heartOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA92E"/>
      <stop offset="100%" stop-color="#F07F00"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.20"/>
    </filter>

    <filter id="heartGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff9b22" flood-opacity="0.28"/>
    </filter>

    <style>
      .coverToe1, .coverToe2, .coverToe3, .coverToe4, .coverPaw,
      .toeOverlay, .heartState, .pawReturn, .heartCore {
        transform-box: fill-box;
        transform-origin: center;
      }

      .coverToe1, .coverToe2, .coverToe3, .coverToe4, .coverPaw {
        opacity: 0;
        animation: hidePaw 7s cubic-bezier(.65,0,.35,1) infinite;
      }

      .coverToe2 { animation-delay: .05s; }
      .coverToe3 { animation-delay: .10s; }
      .coverToe4 { animation-delay: .15s; }

      .toeOverlay {
        opacity: 0;
        animation: toesOut 7s cubic-bezier(.65,0,.35,1) infinite;
        filter: url(#softShadow);
      }

      .toeOverlay.t2 { animation-delay: .05s; }
      .toeOverlay.t3 { animation-delay: .10s; }
      .toeOverlay.t4 { animation-delay: .15s; }

      .heartState {
        opacity: 0;
        animation: heartIn 7s cubic-bezier(.65,0,.35,1) infinite;
        filter: url(#softShadow);
      }

      .pawReturn {
        opacity: 0;
        animation: pawBack 7s cubic-bezier(.65,0,.35,1) infinite;
        filter: url(#softShadow);
      }

      .heartCore {
        animation: heartPulse 7s cubic-bezier(.65,0,.35,1) infinite;
        filter: url(#heartGlow);
      }

      @keyframes hidePaw {
        0%, 24%, 78%, 100% { opacity: 0; }
        34%, 68% { opacity: 1; }
      }

      @keyframes toesOut {
        0%, 20%, 82%, 100% {
          opacity: 0;
          transform: translateY(0px) scale(1);
        }
        32% {
          opacity: 1;
          transform: translateY(0px) scale(1);
        }
        48%, 62% {
          opacity: 0;
          transform: translateY(16px) scale(0.35);
        }
      }

      @keyframes heartIn {
        0%, 24%, 78%, 100% {
          opacity: 0;
          transform: scale(.86);
        }
        38% {
          opacity: 1;
          transform: scale(1.02);
        }
        52% {
          opacity: 1;
          transform: scale(1.06);
        }
        68% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes heartPulse {
        0%, 24%, 78%, 100% {
          transform: scale(1);
        }
        42% {
          transform: scale(1.10);
        }
        56% {
          transform: scale(1.17);
        }
        68% {
          transform: scale(1.08);
        }
      }

      @keyframes pawBack {
        0%, 26%, 70% {
          opacity: 0;
          transform: scale(.92);
        }
        82%, 100% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </defs>

  <image href="bichitos-logo-base.png"
         x="0" y="0"
         width="1536" height="342"
         preserveAspectRatio="xMidYMid meet"/>

  <g clip-path="url(#badgeClip)">
    <circle cx="200" cy="165" r="142" fill="url(#badgeBlue)"/>

    <ellipse class="coverToe1" cx="122" cy="154" rx="28" ry="32" transform="rotate(-18 122 154)" fill="url(#badgeBlue)"/>
    <ellipse class="coverToe2" cx="168" cy="107" rx="27" ry="34" transform="rotate(-8 168 107)" fill="url(#badgeBlue)"/>
    <ellipse class="coverToe3" cx="234" cy="107" rx="27" ry="34" transform="rotate(8 234 107)" fill="url(#badgeBlue)"/>
    <ellipse class="coverToe4" cx="280" cy="154" rx="28" ry="32" transform="rotate(18 280 154)" fill="url(#badgeBlue)"/>

    <path class="coverPaw"
      d="M129 215 C129 182 157 161 186 161 C191 161 196 163 200 166 C205 163 210 161 215 161 C244 161 272 182 272 215 C272 247 243 267 200 300 C157 267 129 247 129 215Z"
      fill="url(#badgeBlue)"/>

    <ellipse class="toeOverlay t1" cx="122" cy="154" rx="24" ry="28" transform="rotate(-18 122 154)" fill="white"/>
    <ellipse class="toeOverlay t2" cx="168" cy="107" rx="23" ry="31" transform="rotate(-8 168 107)" fill="white"/>
    <ellipse class="toeOverlay t3" cx="234" cy="107" rx="23" ry="31" transform="rotate(8 234 107)" fill="white"/>
    <ellipse class="toeOverlay t4" cx="280" cy="154" rx="24" ry="28" transform="rotate(18 280 154)" fill="white"/>

    <path class="heartState"
      d="M200 291 C200 291 131 250 131 188 C131 150 157 124 190 124 C208 124 223 133 233 149 C243 133 258 124 276 124 C309 124 335 150 335 188 C335 250 266 291 266 291 C266 291 244 304 200 291Z"
      fill="white"/>

    <g class="pawReturn">
      <ellipse cx="122" cy="154" rx="24" ry="28" transform="rotate(-18 122 154)" fill="white"/>
      <ellipse cx="168" cy="107" rx="23" ry="31" transform="rotate(-8 168 107)" fill="white"/>
      <ellipse cx="234" cy="107" rx="23" ry="31" transform="rotate(8 234 107)" fill="white"/>
      <ellipse cx="280" cy="154" rx="24" ry="28" transform="rotate(18 280 154)" fill="white"/>
      <path d="M129 215 C129 182 157 161 186 161 C191 161 196 163 200 166 C205 163 210 161 215 161 C244 161 272 182 272 215 C272 247 243 267 200 300 C157 267 129 247 129 215Z" fill="white"/>
    </g>

    <path class="heartCore"
      d="M201 235 C201 235 169 214 169 187 C169 170 182 158 197 158 C206 158 213 162 218 170 C223 162 230 158 239 158 C254 158 267 170 267 187 C267 214 235 235 235 235 C235 235 226 242 201 235Z"
      fill="url(#heartOrange)"/>
  </g>
</svg>
